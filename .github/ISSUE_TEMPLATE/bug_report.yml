name: Bug report
description: Something's broken or behaving unexpectedly.
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear, concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: How can someone else reproduce this?
      placeholder: |
        1. Configure ...
        2. Call tool `searchProspects` with ...
        3. Observed envelope: ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: From `package.json` or the GitHub Release tag (e.g. v0.1.2)
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node version
      description: Output of `node --version`
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Stderr output, error envelopes, etc. Redact tokens.
      render: shell
